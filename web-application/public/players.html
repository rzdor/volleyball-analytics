<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <a id="playersBackLink" class="page-back-link" href="/">← Back</a>
      <h1>🧍 Player List</h1>
      <p id="playersSubtitle">Loading detected players...</p>
    </header>

    <main>
      <div id="playersLoading" class="loading">
        <div class="spinner"></div>
        <p>Loading detected players...</p>
      </div>

      <div id="playersError" class="results hidden">
        <h2>Unable to load player list</h2>
        <p id="playersErrorText"></p>
      </div>

      <div id="playersContent" class="results hidden">
        <div class="page-header-actions">
          <button id="savePlayersButton" type="button" class="btn-primary">Save Player List</button>
        </div>

        <div class="analysis-section">
          <h3>Player summary</h3>
          <div id="playersFacts" class="status-facts"></div>
        </div>

        <div id="playersStatus" class="status-error hidden"></div>

        <div id="playerCards" class="player-grid"></div>
      </div>
    </main>
  </div>

  <script src="/players.js"></script>
</body>
</html>
