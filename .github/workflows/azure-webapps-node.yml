# Deploy Node.js app to Azure Web App using OIDC authentication
#
# To configure this workflow:
#
# 1. Create an Azure AD App Registration and configure federated credentials for GitHub Actions:
#    - Go to Azure Portal > Microsoft Entra ID > App registrations > New registration
#    - Add a federated credential for your GitHub repo (Certificates & secrets > Federated credentials)
#    - Set Subject identifier to: repo:rzdor/volleyball-analytics:ref:refs/heads/main
#
# 2. Grant the App Registration access to your Azure Web App:
#    - Go to your App Service > Access control (IAM) > Add role assignment
#    - Assign "Contributor" role to your App Registration
#
# 3. Create these GitHub repository secrets:
#    - AZURE_CLIENT_ID: Application (client) ID from App Registration
#    - AZURE_TENANT_ID: Directory (tenant) ID from Microsoft Entra ID
#    - AZURE_SUBSCRIPTION_ID: Your Azure subscription ID
#

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy_web:
        description: 'Deploy Web Application'
        type: boolean
        default: true
      deploy_functions:
        description: 'Deploy Functions App'
        type: boolean
        default: true

env:
  AZURE_WEBAPP_NAME: 'volleyball-web'    # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # path to the web app project for deployment
  AZURE_FUNCTIONAPP_NAME: 'volleyball-functions'         # set this to your Azure Function App name to deploy functions
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'video-processing' # path to the video-processing project for deployment
  FUNCTIONAPP_WORKING_DIRECTORY: 'video-processing'
  WEBAPP_WORKING_DIRECTORY: 'web-application'
  AZURE_RESOURCE_GROUP: 'volleyball-rg-1'              # set this to your Azure resource group
  NODE_VERSION: '20.x'                # set this to the node version to use
  ACR_NAME: 'volleyballacr'           # Azure Container Registry name
  ACR_IMAGE: 'volleyball-functions'   # Docker image name in ACR

permissions:
  id-token: write
  contents: read

jobs:
  build_web:
    if: ${{ github.event_name == 'push' || inputs.deploy_web }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-application/package-lock.json

    - name: npm install, build, and test (web)
      run: |
        npm install
        npm run build --if-present
        npm run test --if-present
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Install production dependencies
      run: npm ci --omit=dev
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Create deployment package
      run: zip -rq ../web-app.zip package.json package-lock.json dist/ node_modules/ public/ uploads/
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Upload web artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: web-app
        path: web-app.zip

  deploy_web:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    needs: build_web
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download web artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: web-app

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Deploy to Azure WebApp'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: web-app.zip

  build_and_deploy_functions:
    if: ${{ github.event_name == 'push' || inputs.deploy_functions }}
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: video-processing/package-lock.json

    - name: npm install and build (video-processing)
      run: |
        npm install
        npm run build
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Docker image to ACR
      run: |
        az acr build \
          --registry ${{ env.ACR_NAME }} \
          --image ${{ env.ACR_IMAGE }}:${{ github.sha }} \
          --image ${{ env.ACR_IMAGE }}:latest \
          .
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Restart Function App to pull new image
      run: az webapp restart --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
