# Full deployment pipeline: Infrastructure → Code → EventGrid → Monitoring
#
# Runs the complete deployment sequence:
#   1. Deploy ARM infrastructure template (azuredeploy.json)
#   2. Build and deploy web app + function app/container worker code
#   3. Deploy EventGrid wiring (eventgrid.json)
#   4. Deploy monitoring workbook and diagnostics (monitoring-workbook.json)
#
# Requires a single manual approval at the start via the 'Development' environment
# to prevent accidental environment recreation.
#
# Prerequisites:
#   1. Create GitHub environment: 'Development' (with required reviewers)
#      - Go to Settings > Environments > New environment > 'Development'
#      - Enable "Required reviewers" and add approvers
#   2. GitHub repository secrets:
#      - AZURE_CLIENT_ID
#      - AZURE_TENANT_ID
#      - AZURE_SUBSCRIPTION_ID

name: Deploy Infrastructure, Code & Monitoring

on:
  workflow_dispatch:
    inputs:
      deploy_infrastructure:
        description: 'Deploy ARM infrastructure template'
        type: boolean
        default: true
      deploy_code:
        description: 'Build and deploy application code'
        type: boolean
        default: true
      deploy_eventgrid:
        description: 'Deploy EventGrid wiring'
        type: boolean
        default: true
      deploy_monitoring:
        description: 'Deploy monitoring workbook and diagnostics'
        type: boolean
        default: true
      azure_location:
        description: 'Azure region for resource group'
        type: string
        default: 'eastus'
      clean_resource_group:
        description: 'Delete existing resource group before deploying (destroys all resources!)'
        type: boolean
        default: false
      function_ready_timeout_seconds:
        description: 'How long to wait for the Function App to expose functions before EventGrid deploy'
        type: string
        default: '300'
      run_sample_video_import:
        description: 'Run the sample post-deploy video URL import script'
        type: boolean
        default: false

env:
  AZURE_RESOURCE_GROUP: 'volleyball-rg-1'
  AZURE_WEBAPP_NAME: 'volleyball-web'
  AZURE_FUNCTIONAPP_NAME: 'volleyball-functions'
  AZURE_CONTAINERAPP_NAME: 'volleyball-video-worker'
  WEBAPP_WORKING_DIRECTORY: 'web-application'
  FUNCTIONAPP_WORKING_DIRECTORY: 'video-processing'
  WORKER_WORKING_DIRECTORY: 'video-worker'
  NODE_VERSION: '20.x'
  ACR_NAME: 'volleyballacr'
  ACR_FUNCTION_IMAGE: 'volleyball-functions'
  ACR_WORKER_IMAGE: 'volleyball-worker'

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Gate: Single manual approval before anything runs
  # ──────────────────────────────────────────────
  approve:
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - run: echo "Deployment approved, proceeding..."

  # ──────────────────────────────────────────────
  # Step 1: Deploy infrastructure
  # ──────────────────────────────────────────────
  deploy_infrastructure:
    if: ${{ inputs.deploy_infrastructure }}
    needs: approve
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Delete existing resource group
      if: ${{ inputs.clean_resource_group }}
      run: |
        if az group exists --name ${{ env.AZURE_RESOURCE_GROUP }} | grep -q true; then
          echo "Deleting resource group ${{ env.AZURE_RESOURCE_GROUP }}..."
          az group delete --name ${{ env.AZURE_RESOURCE_GROUP }} --yes
        else
          echo "Resource group does not exist, skipping."
        fi

    - name: Ensure resource group exists
      run: |
        az group create \
          --name ${{ env.AZURE_RESOURCE_GROUP }} \
          --location ${{ inputs.azure_location }}

    - name: Deploy ARM infrastructure template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
        template: deployment/azuredeploy.json
        parameters: deployment/azuredeploy.parameters.json
        deploymentMode: Incremental

  # ──────────────────────────────────────────────
  # Step 2: Build and deploy application code in parallel
  # ──────────────────────────────────────────────
  build_and_deploy_web:
    needs: [approve, deploy_infrastructure]
    if: ${{ always() && inputs.deploy_code && needs.approve.result == 'success' && (needs.deploy_infrastructure.result == 'success' || needs.deploy_infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-application/package-lock.json

    - name: npm install, build, and test (web)
      run: |
        npm install
        npm run build --if-present
        npm run test --if-present
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Install production dependencies
      run: npm ci --omit=dev
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Create deployment package
      run: zip -rq ../web-app.zip package.json package-lock.json dist/ node_modules/ public/ uploads/
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: web-app.zip

  build_and_deploy_functions:
    needs: [approve, deploy_infrastructure]
    if: ${{ always() && inputs.deploy_code && needs.approve.result == 'success' && (needs.deploy_infrastructure.result == 'success' || needs.deploy_infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: video-processing/package-lock.json

    - name: npm install and build (video-processing)
      run: |
        npm install
        npm run build
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Function App image to ACR
      run: |
        az acr build \
          --registry ${{ env.ACR_NAME }} \
          --image ${{ env.ACR_FUNCTION_IMAGE }}:${{ github.sha }} \
          --image ${{ env.ACR_FUNCTION_IMAGE }}:latest \
          .
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Restart Function App to pull new image
      run: az webapp restart --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

  build_and_deploy_worker:
    needs: [approve, deploy_infrastructure]
    if: ${{ always() && inputs.deploy_code && needs.approve.result == 'success' && (needs.deploy_infrastructure.result == 'success' || needs.deploy_infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: video-worker/package-lock.json

    - name: npm install and build (video-worker)
      run: |
        npm install
        npm run build
      working-directory: ${{ env.WORKER_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push worker image to ACR
      run: |
        az acr build \
          --registry ${{ env.ACR_NAME }} \
          --image ${{ env.ACR_WORKER_IMAGE }}:${{ github.sha }} \
          --image ${{ env.ACR_WORKER_IMAGE }}:latest \
          .
      working-directory: ${{ env.WORKER_WORKING_DIRECTORY }}

    - name: Update Container App worker image
      run: |
        az containerapp update \
          --name ${{ env.AZURE_CONTAINERAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_WORKER_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────────
  # Step 3: Deploy EventGrid wiring
  # ──────────────────────────────────────────────
  deploy_eventgrid:
    needs: [build_and_deploy_web, build_and_deploy_functions, build_and_deploy_worker]
    if: ${{ always() && inputs.deploy_eventgrid && (needs.build_and_deploy_functions.result == 'success' || needs.build_and_deploy_functions.result == 'skipped') && (needs.build_and_deploy_worker.result == 'success' || needs.build_and_deploy_worker.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Wait for Function App to be ready
      run: |
        timeout_seconds="${{ inputs.function_ready_timeout_seconds }}"
        poll_interval_seconds=15
        expected_function="queueVideoUploadBlob"
        deadline=$((SECONDS + timeout_seconds))

        echo "Waiting up to ${timeout_seconds}s for Function App to expose ${expected_function}..."

        while true; do
          function_names="$(az functionapp function list \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[].name" -o tsv 2>/dev/null || true)"

          if printf '%s\n' "$function_names" | grep -q "$expected_function"; then
            echo "Function App is ready."
            printf '%s\n' "$function_names"
            break
          fi

          if [ "$SECONDS" -ge "$deadline" ]; then
            echo "Timed out waiting for Function App readiness after ${timeout_seconds}s."
            echo "Last observed functions:"
            printf '%s\n' "$function_names"
            exit 1
          fi

          echo "Function not ready yet; retrying in ${poll_interval_seconds}s..."
          sleep "$poll_interval_seconds"
        done

    - name: Deploy EventGrid ARM template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
        template: deployment/eventgrid.json
        parameters: deployment/eventgrid.parameters.json
        deploymentMode: Incremental

  # ──────────────────────────────────────────────
  # Step 4: Deploy monitoring workbook and diagnostics
  # ──────────────────────────────────────────────
  deploy_monitoring:
    needs: [approve, build_and_deploy_web, build_and_deploy_functions, build_and_deploy_worker, deploy_eventgrid]
    if: ${{ always() && inputs.deploy_monitoring && needs.approve.result == 'success' && (needs.build_and_deploy_web.result == 'success' || needs.build_and_deploy_web.result == 'skipped') && (needs.build_and_deploy_functions.result == 'success' || needs.build_and_deploy_functions.result == 'skipped') && (needs.build_and_deploy_worker.result == 'success' || needs.build_and_deploy_worker.result == 'skipped') && (needs.deploy_eventgrid.result == 'success' || needs.deploy_eventgrid.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy monitoring workbook and diagnostics
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
        template: deployment/monitoring-workbook.json
        parameters: deployment/monitoring-workbook.parameters.json
        deploymentMode: Incremental

  import_sample_video:
    needs: [approve, build_and_deploy_web, build_and_deploy_functions, build_and_deploy_worker, deploy_eventgrid, deploy_monitoring]
    if: ${{ always() && inputs.run_sample_video_import && needs.approve.result == 'success' && (needs.build_and_deploy_web.result == 'success' || needs.build_and_deploy_web.result == 'skipped') && (needs.build_and_deploy_functions.result == 'success' || needs.build_and_deploy_functions.result == 'skipped') && (needs.build_and_deploy_worker.result == 'success' || needs.build_and_deploy_worker.result == 'skipped') && (needs.deploy_eventgrid.result == 'success' || needs.deploy_eventgrid.result == 'skipped') && (needs.deploy_monitoring.result == 'success' || needs.deploy_monitoring.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Import sample video URL
      env:
        WEB_APP_BASE_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
      run: node deployment/scripts/import-sample-video.mjs
