# Full deployment pipeline: Infrastructure → Code → EventGrid
#
# Runs the complete deployment sequence:
#   1. Deploy ARM infrastructure template (azuredeploy.json)
#   2. Build and deploy web app + function app code
#   3. Deploy EventGrid wiring (eventgrid.json)
#
# Requires manual approval via the 'Infrastructure' environment
# to prevent accidental environment recreation.
#
# Prerequisites:
#   1. Create GitHub environments: 'Infrastructure' (with required reviewers) and 'Development'
#      - Go to Settings > Environments > New environment > 'Infrastructure'
#      - Enable "Required reviewers" and add approvers
#   2. GitHub repository secrets:
#      - AZURE_CLIENT_ID
#      - AZURE_TENANT_ID
#      - AZURE_SUBSCRIPTION_ID
#   3. GitHub repository variables:
#      - AZURE_RESOURCE_GROUP (e.g. volleyball-rg)

name: Deploy Infrastructure & Code

on:
  workflow_dispatch:
    inputs:
      deploy_infrastructure:
        description: 'Deploy ARM infrastructure template'
        type: boolean
        default: true
      deploy_code:
        description: 'Build and deploy application code'
        type: boolean
        default: true
      deploy_eventgrid:
        description: 'Deploy EventGrid wiring'
        type: boolean
        default: true

env:
  AZURE_RESOURCE_GROUP: 'volleyball-rg-1'
  AZURE_WEBAPP_NAME: 'volleyball-web'
  AZURE_FUNCTIONAPP_NAME: 'volleyball-functions'
  WEBAPP_WORKING_DIRECTORY: 'web-application'
  FUNCTIONAPP_WORKING_DIRECTORY: 'video-processing'
  NODE_VERSION: '24.x'
  ACR_NAME: 'volleyballacr'
  ACR_IMAGE: 'volleyball-functions'

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Deploy infrastructure (requires approval)
  # ──────────────────────────────────────────────
  deploy_infrastructure:
    if: ${{ inputs.deploy_infrastructure }}
    runs-on: ubuntu-latest
    environment:
      name: 'Infrastructure'
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy ARM infrastructure template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
        template: deployment/azuredeploy.json
        parameters: deployment/azuredeploy.parameters.json
        deploymentMode: Incremental

  # ──────────────────────────────────────────────
  # Step 2: Build and deploy application code
  # ──────────────────────────────────────────────
  build_and_deploy_web:
    needs: deploy_infrastructure
    if: ${{ always() && inputs.deploy_code && (needs.deploy_infrastructure.result == 'success' || needs.deploy_infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-application/package-lock.json

    - name: npm install, build, and test (web)
      run: |
        npm install
        npm run build --if-present
        npm run test --if-present
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Install production dependencies
      run: npm ci --omit=dev
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Create deployment package
      run: zip -rq ../web-app.zip package.json package-lock.json dist/ node_modules/ public/ uploads/ web.config
      working-directory: ${{ env.WEBAPP_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: web-app.zip

  build_and_deploy_functions:
    if: ${{ always() && inputs.deploy_code && (needs.deploy_infrastructure.result == 'success' || needs.deploy_infrastructure.result == 'skipped') }}
    needs: deploy_infrastructure
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: video-processing/package-lock.json

    - name: npm install and build (video-processing)
      run: |
        npm install
        npm run build
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and push Docker image to ACR
      run: |
        az acr build \
          --registry ${{ env.ACR_NAME }} \
          --image ${{ env.ACR_IMAGE }}:${{ github.sha }} \
          --image ${{ env.ACR_IMAGE }}:latest \
          .
      working-directory: ${{ env.FUNCTIONAPP_WORKING_DIRECTORY }}

    - name: Restart Function App to pull new image
      run: az webapp restart --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

  # ──────────────────────────────────────────────
  # Step 3: Deploy EventGrid wiring
  # ──────────────────────────────────────────────
  deploy_eventgrid:
    if: ${{ always() && inputs.deploy_eventgrid && (needs.build_and_deploy_functions.result == 'success' || needs.build_and_deploy_functions.result == 'skipped') }}
    needs: [build_and_deploy_web, build_and_deploy_functions]
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Wait for Function App to be ready
      run: |
        echo "Waiting 60s for Function App to start with new image..."
        sleep 60
        az functionapp function list \
          --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "[].name" -o tsv

    - name: Deploy EventGrid ARM template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
        template: deployment/eventgrid.json
        parameters: deployment/eventgrid.parameters.json
        deploymentMode: Incremental
